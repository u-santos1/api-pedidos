# 1. Habilita o console (Isso é o que está faltando!)
spring.h2.console.enabled=true

# 2. Define o caminho (opcional, mas garante o acesso)
spring.h2.console.path=/h2-console

# 3. Configura o banco para ser estático na memória
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 4. Configuração extra para o console não ser bloqueado por frames
spring.h2.console.settings.web-allow-others=true

# Mostra o SQL no console
spring.jpa.show-sql=true
# Formata o SQL para ficar legível
spring.jpa.properties.hibernate.format_sql=true
# Mostra os valores reais que estão sendo salvos (os parâmetros)
logging.level.org.hibernate.orm.jdbc.bind=trace